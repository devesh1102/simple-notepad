name: Build and Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "assembly=$version.0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $version"

      - name: Restore
        run: dotnet restore .\SimpleNotepad.Tests\SimpleNotepad.Tests.csproj

      - name: Build solution
        run: dotnet build .\SimpleNotepad.Tests\SimpleNotepad.Tests.csproj -c Release --no-restore

      - name: Start Azurite (for integration tests)
        shell: pwsh
        run: |
          npm install -g azurite
          $loc = Join-Path $env:RUNNER_TEMP 'azurite'
          New-Item -ItemType Directory -Force -Path $loc | Out-Null
          Start-Process -FilePath "azurite-blob" -ArgumentList "--silent","--skipApiVersionCheck","--blobHost","127.0.0.1","--blobPort","10000","--location",$loc -WindowStyle Hidden
          # Give Azurite a moment to start listening before tests probe it.
          Start-Sleep -Seconds 5

      - name: Run tests
        run: dotnet test .\SimpleNotepad.Tests\SimpleNotepad.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish app folder (for installer)
        run: >
          dotnet publish .\SimpleNotepad\SimpleNotepad.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.assembly }}
          -p:FileVersion=${{ steps.ver.outputs.assembly }}
          -o .\artifacts\app-folder

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DAppVersion=${{ steps.ver.outputs.version }}
          .\installer\SimpleNotepad.iss

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\release | Out-Null
          Copy-Item .\artifacts\installer\*.exe .\artifacts\release\ -Force
          Get-ChildItem .\artifacts\release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Simple Notepad v${{ steps.ver.outputs.version }}
          body: |
            Automated release built from commit ${{ github.sha }}.

            - `SimpleNotepad-Setup-${{ steps.ver.outputs.version }}.exe` — installer with Start-menu/Desktop shortcuts, clean uninstall, in-place upgrade, and optional AI/sync credential setup. No .NET install required.
          files: |
            artifacts/release/SimpleNotepad-Setup-${{ steps.ver.outputs.version }}.exe
